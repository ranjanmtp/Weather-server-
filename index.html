<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-container">
        <div class="location">
            <h2 class="city">City Name</h2>
        </div>

        <div class="air-quality">
            <h3>Air Quality</h3>
            <p class="aqi-status">Satisfactory <span class="aqi-value">--</span></p>
            <p class="aqi-message">Fetching data...</p>
        </div>

        <div class="weather-details">
            <div class="detail">
                <p>UV</p>
                <h3 class="uv-index">--</h3>
            </div>
            <div class="detail">
                <p>Feels Like</p>
                <h3 class="feels-like">--°</h3>
            </div>
            <div class="detail">
                <p>Humidity</p>
                <h3 class="humidity">--%</h3>
            </div>
            <div class="detail">
                <p>Wind</p>
                <h3 class="wind">-- mph</h3>
            </div>
            <div class="detail">
                <p>Pressure</p>
                <h3 class="pressure">-- hPa</h3>
            </div>
            <div class="detail">
                <p>Visibility</p>
                <h3 class="visibility">-- mi</h3>
            </div>
        </div>

        <div class="sun-info">
            <h3>Sunrise & Sunset</h3>
            <p>🌅 Sunrise: <span class="sunrise">--:-- AM</span></p>
            <p>🌇 Sunset: <span class="sunset">--:-- PM</span></p>
        </div>

        <div class="lifestyle-tips">
            <h3>Lifestyle Tips</h3>
            <div class="tips">
                <p>🌿 High Pollen Count</p>
                <p>☀️ Moderate UV Index</p>
                <p>🎭 Use Oil-Control Products</p>
            </div>
        </div>

        <form class="search-form">
            <input type="text" id="cityname" placeholder="Enter City Name">
            <button type="submit">Get Data</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
<style>
  * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #121212;
    color: white;
}

.weather-container {
    width: 90%;
    max-width: 450px;
    background: #1E1E1E;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    text-align: center;
}

.location h2 {
    font-size: 24px;
    margin-bottom: 10px;
}

.air-quality, .sun-info, .lifestyle-tips {
    background: #222;
    padding: 15px;
    border-radius: 8px;
    margin: 10px 0;
}

.weather-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.detail {
    background: #292929;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.detail p {
    font-size: 14px;
    color: #aaa;
}

.detail h3 {
    font-size: 18px;
    margin-top: 5px;
}

.search-form {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.search-form input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

.search-form button {
    padding: 10px;
    background: #ff9800;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.tips p {
    font-size: 14px;
    margin: 5px 0;
}
</style>
<script>
  const form = document.querySelector(".search-form");
const cityInput = document.querySelector("#cityname");

const cityNameElement = document.querySelector(".city");
const aqiStatus = document.querySelector(".aqi-status");
const aqiValue = document.querySelector(".aqi-value");
const aqiMessage = document.querySelector(".aqi-message");

const uvElement = document.querySelector(".uv-index");
const feelsLikeElement = document.querySelector(".feels-like");
const humidityElement = document.querySelector(".humidity");
const windElement = document.querySelector(".wind");
const pressureElement = document.querySelector(".pressure");
const visibilityElement = document.querySelector(".visibility");

const sunriseElement = document.querySelector(".sunrise");
const sunsetElement = document.querySelector(".sunset");

const API_KEY = "f2ed9ddac844d9e25d7e420c39e8bc5c";

async function fetchWeather(city) {
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
        if (!response.ok) throw new Error("City not found!");

        const data = await response.json();
        updateUI(data);
        fetchAirQuality(data.coord.lat, data.coord.lon);
    } catch (error) {
        cityNameElement.textContent = "City Not Found!";
    }
}

async function fetchAirQuality(lat, lon) {
    try {
        const response = await fetch(`http://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
        if (!response.ok) throw new Error("Air Quality Data Not Found!");

        const data = await response.json();
        updateAQI(data);
    } catch (error) {
        aqiMessage.textContent = "Air Quality Data Unavailable";
    }
}

function updateUI(data) {
    const { name, main, wind, sys, visibility } = data;

    cityNameElement.textContent = name;
    feelsLikeElement.textContent = `${Math.round(main.feels_like)}°`;
    humidityElement.textContent = `${main.humidity}%`;
    windElement.textContent = `${wind.speed} mph`;
    pressureElement.textContent = `${main.pressure} hPa`;
    visibilityElement.textContent = `${Math.round(visibility / 1609)} mi`;
    uvElement.textContent = "Low"; // OpenWeather doesn't provide free UV data

    sunriseElement.textContent = convertUnixTime(sys.sunrise);
    sunsetElement.textContent = convertUnixTime(sys.sunset);
}

function updateAQI(data) {
    const aqi = data.list[0].main.aqi;
    aqiValue.textContent = aqi;
    aqiStatus.textContent = getAQIStatus(aqi);
    aqiMessage.textContent = getAQIMessage(aqi);
}

function getAQIStatus(aqi) {
    if (aqi === 1) return "Good";
    if (aqi === 2) return "Fair";
    if (aqi === 3) return "Moderate";
    if (aqi === 4) return "Poor";
    return "Very Poor";
}

function getAQIMessage(aqi) {
    return aqi <= 2 ? "Air quality is good." : "Sensitive groups should limit outdoor activity.";
}

function convertUnixTime(timestamp) {
    const date = new Date(timestamp * 1000);
    return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

form.addEventListener("submit", (event) => {
    event.preventDefault();
    const city = cityInput.value.trim();
    if (city) {
        fetchWeather(city);
    }
});
</script>

</script>
</html>
